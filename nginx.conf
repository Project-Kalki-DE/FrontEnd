server {
  listen 80;
  server_name localhost;

  root /usr/share/nginx/html;
  index index.html;

  # ── Security headers ────────────────────────────────────────────────────────
  add_header X-Frame-Options "SAMEORIGIN" always;
  add_header X-Content-Type-Options "nosniff" always;
  add_header Referrer-Policy "strict-origin-when-cross-origin" always;

  # ── API proxy → backend container ───────────────────────────────────────────
  location /api/ {
    proxy_pass         http://backend:3000/api/;
    proxy_http_version 1.1;
    proxy_set_header   Host              $host;
    proxy_set_header   X-Real-IP         $remote_addr;
    proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header   X-Forwarded-Proto $scheme;
    proxy_read_timeout 30s;
  }

  # ── Static assets: long cache ────────────────────────────────────────────────
  location ~* \.(js|css|woff2?|png|jpg|jpeg|svg|ico|webp)$ {
    expires 1y;
    add_header Cache-Control "public, immutable";
    try_files $uri =404;
  }

  # ── Redirect root to default locale ─────────────────────────────────────────
  location = / {
    return 302 $scheme://$http_host/de/;
  }

  # ── German version ───────────────────────────────────────────────────────────
  location /de/ {
    alias /usr/share/nginx/html/de/;
    try_files $uri $uri/ /de/index.html;
  }

  # ── English version ──────────────────────────────────────────────────────────
  location /en/ {
    alias /usr/share/nginx/html/en/;
    try_files $uri $uri/ /en/index.html;
  }

  # ── Turkish version ──────────────────────────────────────────────────────────
  location /tr/ {
    alias /usr/share/nginx/html/tr/;
    try_files $uri $uri/ /tr/index.html;
  }

  # ── Fallback ─────────────────────────────────────────────────────────────────
  location / {
    try_files $uri $uri/ /de/index.html;
  }
}
