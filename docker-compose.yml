version: '3.8'

services:
  backend:
    build: ../BackendService
    env_file:
      - ../BackendService/.env
    environment:
      NODE_ENV: production
    expose:
      - "3000"
    restart: unless-stopped
    networks:
      - app-network

  frontend:
    build: .
    ports:
      - "80:80"
    container_name: frontend_app
    depends_on:
      - backend
    restart: unless-stopped
    networks:
      - app-network

networks:
  app-network:
    driver: bridge
